<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/pages.css">
</head>
<body style="padding:40px;font-family:Inter,sans-serif;background:#fff;color:#333;">
<h1>Product Data Test</h1>
<div id="output"></div>
<script>
const PRODUCTS = [
  {
    id:"maize",name:"Maize",category:"field-crops",type:"Hybrid",code:"TMR-MZ",
    active:true,order:1,detailPage:true,
    description:"High-yielding biotech and conventional maize hybrids.",
    image:"images/products/maize.jpg",
    features:["Biotech & conventional","Kharif & Rabi","Stay-green","High shelling"],
    region:"Central & Southern India",season:"Kharif / Rabi",duration:"95-115 days",
    special:"Pest tolerant, drought tolerance",
    pdf:"brochures/maize.pdf",
    markets:"India, Nepal",
    hybrids:[{name:"Nagma",desc:"Biotech Hybrid -- Kharif"},{name:"TMRH-1422",desc:"Biotech Hybrid -- Rabi"},{name:"TMRH-871",desc:"Conventional Hybrid"}]
  },
  {
    id:"rice",name:"Rice",category:"field-crops",type:"Hybrid",code:"TMR-RC",
    active:true,order:2,detailPage:true,
    description:"Premium rice hybrids across early, medium, and late duration groups.",
    image:"images/products/rice.jpg",
    features:["Long slender grains","Multiple maturity groups","High tillering","Good grain quality"],
    region:"All major rice-growing regions",season:"Kharif",duration:"100-145 days",
    special:"High yield potential",
    pdf:"brochures/rice.pdf",
    markets:"India, Nepal",
    hybrids:[{name:"TMRH-221",desc:"Early (100-110 days)"},{name:"TMRH-335",desc:"Medium (120-130 days)"},{name:"TMRH-448",desc:"Late (140-145 days)"}]
  }
];

var d = document.getElementById('output');
d.innerHTML = '<h2>'+PRODUCTS.length+' products loaded</h2>';
PRODUCTS.forEach(function(p) {
  d.innerHTML += '<div style="border:1px solid #ddd;padding:16px;margin:10px 0;border-radius:8px;">'
    + '<h3 style="margin:0 0 4px">'+p.name+' <span style="font-size:12px;color:#245C3C;font-weight:600">'+p.type+'</span></h3>'
    + '<div style="font-size:13px;color:#666;margin-bottom:8px">'+p.description+'</div>'
    + '<img src="'+p.image+'" style="width:100px;height:100px;object-fit:cover;border-radius:4px;float:left;margin-right:12px;">'
    + '<div style="font-size:12px"><strong>Region:</strong> '+p.region+'<br>'
    + '<strong>Season:</strong> '+p.season+'<br>'
    + '<strong>Duration:</strong> '+p.duration+'<br>'
    + '<strong>Special:</strong> '+p.special+'<br>'
    + '<a href="'+p.pdf+'" target="_blank" style="color:#245C3C;font-weight:600">📄 Brochure</a></div>'
    + '<div style="clear:both"></div></div>';
});
</script>
</body>
</html>
